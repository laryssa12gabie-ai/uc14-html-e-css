<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Informações principais</h1>
<label for="nome">Nome:</label>
    <input type="text" name="nome"  placeholder="Nome completo">
    <br>
    <br>
    <label for="Email">Email:</label>
    <input type="email" placeholder="Email">
    <br>
    <br>
<label for="Senha:">Senha:</label>
<input type="password" placeholder="Senha">
<br>
<br>
<h2>Dados pessoas</h2>
<label for="data">Data de nascimento:</label>
<input type="date" placeholder="Data">
<br>
<br>
<label for="idade">Idade</label>
<input type="number" min="0" max="120" placeholder="Idade">
<br>
<br>
<label for="cor">Cor favorita</label>
<input type="color" placeholder="Cor favorita">
<br>
<br>
<h3>Preferências</h3>
<label for="gênero">Gênero</label>
<input type="radio" placeholder="Gênero">
<input type="radio" name="genero" value="feminino">
<input type="radio" name="genero" value="masculino">
<br>
<br>
<label for="Hobbies">Hobbies:</label>
<input type="checkbox" name="Hobbies" value="jogar">
<input type="checkbox" name="Hobbies" value="ler">
<input type="checkbox" name="Hobbies" value="nadar">

</body>
</html>
